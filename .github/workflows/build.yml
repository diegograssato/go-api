name: Go

on:
  # triggers the execution of jobs when committed to the main branch
  push:
    branches:
      - main
  # trigger execution of jobs when merging to main branch
  pull_request:
    branches:
      - main

jobs:

  lint:
    name: Golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - name: Lint Go Code
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          gofmt -s -w .
          golangci-lint run ./...

  vulnerabilidades:
    name: Vulnerabilidades
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'
          cache: true           
      - name: Verificar Vulnerabilidades (govulncheck)
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...         
      
                
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - name: Run Unit tests
        run: make test


      - name: Run coverage tests
        run: go test ./... -coverprofile=coverage.txt
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Test coverage check
        env: 
          TESTCOVERAGE_THRESHOLD: 20
        run: |
            echo "Checking test coverage"
            totalCoverage=`go tool cover -func=coverage.txt | grep total | grep -Eo '[0-9]+\.[0-9]+'`
            echo "Total test coverage: $totalCoverage%"
            echo "Desired threshold: $TESTCOVERAGE_THRESHOLD%"

            if (( $(echo "$totalCoverage $TESTCOVERAGE_THRESHOLD" | awk '{print($1 > $2)}') )); then 
              echo "OK"
            else 
              echo "The test coverage should be greater than $TESTCOVERAGE_THRESHOLD%"
              echo "Failed"
              exit 1
            fi
            

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [lint, vulnerabilidades, test]
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - name: Build
        run: make build

  image:
    name: Build Image and Scan Vulnerabilities
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # - name: Build an image from Dockerfile
      #   run: docker build -t docker.io/diegograssato/go-api:${{ github.sha }} .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Load local image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true # Carrega a imagem no daemon local do Docker para o Trivy acessar
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.APPLICATION_NAME }}:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.APPLICATION_NAME }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy:
    name: Deploy Application
    needs: [build, image]
    runs-on: ubuntu-latest
    steps:
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3 

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.APPLICATION_NAME }}:latest