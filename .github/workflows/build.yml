name: Go

on:
  # triggers the execution of jobs when committed to the main branch
  push:
    branches:
      - main
  # trigger execution of jobs when merging to main branch
  pull_request:
    branches:
      - main

jobs:

  lint:
    name: Golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - name: Rodar Linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  vulnerabilidades:
    name: Vulnerabilidades
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verificar Vulnerabilidades (govulncheck)
        uses: golang/govulncheck-action@v1
        with:
           go-version-input: 1.26.1
           go-package: ./...   
        
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - name: Run Unit tests
        run: make test


  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, vulnerabilidades, test]
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - name: Build
        run: make build